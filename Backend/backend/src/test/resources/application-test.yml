# Test profile – uses Flapdoodle embedded MongoDB
spring:
  data:
    mongodb:
      # Flapdoodle overrides this automatically; explicit uri avoids connection errors
      uri: mongodb://localhost:27017/scholarship_test_db
  mail:
    host: localhost
    port: 3025

jwt:
  secret: 3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
  expiration: 86400000
  refresh-expiration: 604800000

cors:
  allowed-origins: http://localhost:3000
  allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

file:
  upload-dir: ./test-uploads

logging:
  level:
    com.scholarship: WARN
    org.springframework: WARN
