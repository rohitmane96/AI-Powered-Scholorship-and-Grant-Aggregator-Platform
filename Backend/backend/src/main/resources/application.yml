spring:
  application:
    name: scholarship-platform

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/scholarship_db}

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

  cache:
    type: simple

server:
  port: ${SERVER_PORT:8080}

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b}
  expiration: 86400000        # 24 hours
  refresh-expiration: 604800000 # 7 days

# CORS Configuration
cors:
  allowed-origins: http://localhost:3000,http://localhost:5173
  allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# File Storage
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  max-size: 10485760  # 10MB

# Springdoc / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    operationsSorter: alpha
    tagsSorter: alpha

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    mail:
      enabled: false
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.scholarship: DEBUG
    org.springframework.security: INFO
    org.springframework.data.mongodb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n"

# App Info
info:
  app:
    name: ScholarMatch AI
    description: AI-Driven Scholarship & Grant Aggregator Platform
    version: "@project.version@"
    team: Group 32 - Indira College of Engineering and Management
