<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Deadline Reminder – ScholarMatch AI</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f7f9; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; background: #fff;
                 border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); overflow: hidden; }
    .header  { background: #d97706; color: #fff; padding: 32px 40px; text-align: center; }
    .header h1 { margin: 0; font-size: 24px; }
    .body    { padding: 32px 40px; color: #374151; line-height: 1.6; }
    .days    { font-size: 36px; font-weight: bold; color: #d97706; text-align: center; margin: 16px 0; }
    .btn     { display: inline-block; margin: 24px 0; padding: 14px 32px;
               background: #d97706; color: #fff; text-decoration: none;
               border-radius: 6px; font-weight: bold; font-size: 16px; }
    .footer  { text-align: center; padding: 16px; font-size: 12px; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>Deadline Reminder ⏰</h1></div>
    <div class="body">
      <p>Hi <strong th:text="${name}">Student</strong>,</p>
      <p>The deadline for <strong th:text="${scholarshipName}">Scholarship</strong>
         is approaching!</p>
      <p class="days"><span th:text="${daysLeft}">7</span> day(s) remaining</p>
      <p style="text-align:center;">
        <a th:href="${applyUrl}" class="btn">Apply Now</a>
      </p>
      <p>Don't miss this opportunity. Complete your application before the deadline.</p>
    </div>
    <div class="footer">&copy; 2024 ScholarMatch AI &bull; Group 32 – ICEM</div>
  </div>
</body>
</html>
