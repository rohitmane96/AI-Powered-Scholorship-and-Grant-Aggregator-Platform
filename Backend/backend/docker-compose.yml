version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# ScholarMatch AI – Docker Compose
# Group 32 – Indira College of Engineering and Management
#
# Usage:
#   docker-compose up --build          # Production mode
#   docker-compose --profile dev up    # Development mode with sample data
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:6
    container_name: scholarmatch-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: scholarship_db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Spring Boot Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scholarmatch-backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      mongo:
        condition: service_healthy
      recommender:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongo:27017/scholarship_db
      PYTHON_RECOMMENDER_ENABLED: "true"
      PYTHON_RECOMMENDER_URL: http://recommender:8090
      JWT_SECRET: ${JWT_SECRET:-3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b}
      EMAIL_USERNAME: ${EMAIL_USERNAME:-noreply@scholarmatch.ai}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-changeme}
      SERVER_PORT: 8080
      FILE_UPLOAD_DIR: /app/uploads
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  recommender:
    build:
      context: ./ml-recommender
      dockerfile: Dockerfile
    container_name: scholarmatch-recommender
    restart: unless-stopped
    expose:
      - "8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local
  uploads_data:
    driver: local
